name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 のようなバージョンのタグがPushされた時にトリガー
  workflow_dispatch: # 手動でワークフローを実行できるようにする

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリースを作成・ファイルをアップロードするために必要な権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build project (Release)
        run: cargo build --release

      - name: Archive binary
        run: |
          # 成果物を圧縮（Cargo.tomlのnameに合わせた実行ファイル名）
          tar -czvf Battery-TUI-linux-x86_64.tar.gz -C target/release Battery-TUI

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Battery-TUI-linux-x86_64.tar.gz
          generate_release_notes: true # 自動でリリースノート（PRやコミットのまとめ）を生成
    
      - name: Run release.sh
        run: ./release.sh